<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Grupo Escoteiro Ordem de Lis 272/PR</title>
  <link rel="icon" type="image/jpeg" href="imagens/logo.jpg">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="css/style.css" rel="stylesheet">
</head>

<body class="scout-auth-bg d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">

        <div class="card border-0 shadow-lg">
          <div class="card-body p-4 p-md-5">

            <div class="text-center mb-4">
              <img src="imagens/logo.jpg" alt="Logo 272" height="80" class="rounded mb-3 brand-logo-img">
              <h4 class="fw-bold text-scout-blue">Bem-vindo de volta!</h4>
              <p class="small text-muted">Entre com suas credenciais para acessar.</p>
            </div>

            <form id="formLogin" action="login.php" method="post" novalidate autocomplete="off">

              <div class="mb-3">
                <label class="form-label fw-semibold" for="cpf">CPF</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-vcard"></i></span>
                  <input class="form-control border-start-0 ps-0" id="cpf" name="cpf" inputmode="numeric"
                    autocomplete="off" placeholder="000.000.000-00" maxlength="14" required />
                  <div class="invalid-feedback">Informe um CPF válido.</div>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold" for="senha">Senha</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                  <input class="form-control border-start-0 ps-0" id="senha" name="senha" type="password"
                    autocomplete="new-password" placeholder="Sua senha" required />
                  <button class="btn btn-outline-secondary border-start-0" type="button" id="btnToggleSenha"
                    aria-label="Mostrar senha"><i class="bi bi-eye"></i></button>
                  <div class="invalid-feedback">Informe a senha.</div>
                </div>
                <div class="form-text small-muted mt-1"><i class="bi bi-info-circle"></i> Toque no ícone de olho para
                  visualizar a senha.</div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="1" id="lembrar" name="lembrar">
                  <label class="form-check-label small" for="lembrar">Lembrar-me</label>
                </div>
                <a class="text-decoration-none small text-scout-blue fw-semibold" href="esqueci_senha.html">Esqueci
                  minha senha</a>
              </div>

              <button class="btn btn-primary btn-lg w-100 text-uppercase" type="submit">Entrar</button>

              <div class="text-center mt-4">
                <span class="text-muted small">Ainda não tem conta?</span>
                <a class="text-scout-blue fw-bold text-decoration-none ms-1" href="registrar.html">Criar conta</a>
              </div>

              <hr class="my-4 opacity-10">

              <div class="small text-muted text-center" style="font-size: 0.8rem;">
                <i class="bi bi-shield-check"></i> Ambiente Seguro • LGPD
              </div>

            </form>
          </div>
        </div>

        <div class="text-center mt-4 text-muted small">
          © <span id="ano"></span> Grupo Escoteiro Ordem de Lis 272/PR
          <br>
          <a href="index.html" class="text-decoration-none text-muted">Voltar ao início</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('ano').textContent = new Date().getFullYear();

    // Restringir entrada apenas para números (keydown/keypress)
    function apenasNumeros(e) {
      // Permite: backspace, delete, tab, escape, enter e .
      if ([46, 8, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 ||
        // Permite: Ctrl+A, Command+A
        (e.keyCode === 65 && (e.ctrlKey === true || e.metaKey === true)) ||
        // Permite: home, end, left, right, down, up
        (e.keyCode >= 35 && e.keyCode <= 40)) {
        return;
      }
      // Garante que é número e para o keypress
      if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) && (e.keyCode < 96 || e.keyCode > 105)) {
        e.preventDefault();
      }
    }

    // Máscara de CPF (000.000.000-00)
    const cpf = document.getElementById('cpf');
    cpf.addEventListener('keydown', apenasNumeros); // Bloqueia não-números
    cpf.addEventListener('input', () => {
      let v = cpf.value.replace(/\D/g, '').slice(0, 11);
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      cpf.value = v;
    });

    function cpfValido(cpfStr) {
      const s = (cpfStr || '').replace(/\D/g, '');
      if (s.length !== 11) return false;
      if (/^(\d)\1+$/.test(s)) return false;

      let soma = 0, resto = 0;

      for (let i = 1; i <= 9; i++) soma += parseInt(s.substring(i - 1, i)) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(s.substring(9, 10))) return false;

      soma = 0;
      for (let i = 1; i <= 10; i++) soma += parseInt(s.substring(i - 1, i)) * (12 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(s.substring(10, 11))) return false;

      return true;
    }

    // Mostrar/ocultar senha
    const senha = document.getElementById('senha');
    const btnToggle = document.getElementById('btnToggleSenha');
    btnToggle.addEventListener('click', () => {
      const isPass = senha.type === 'password';
      senha.type = isPass ? 'text' : 'password';
      // Troca ícone do Bootstrap Icons
      btnToggle.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
      btnToggle.setAttribute('aria-label', isPass ? 'Ocultar senha' : 'Mostrar senha');
    });

    // Validação básica
    const form = document.getElementById('formLogin');
    form.addEventListener('submit', (e) => {
      const cpfOk = cpfValido(cpf.value);
      const senhaOk = (senha.value || '').trim().length > 0;

      cpf.classList.toggle('is-invalid', !cpfOk);
      senha.classList.toggle('is-invalid', !senhaOk);

      if (!cpfOk || !senhaOk) {
        e.preventDefault();
        e.stopPropagation();
      }
    });
  </script>
  <!-- Modal de Aviso -->
  <div class="modal fade" id="modalAviso" tabindex="-1" aria-labelledby="modalAvisoLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="modalAvisoLabel">Aviso</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body" id="modalAvisoBody">
          ...
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Entendido</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Verificação de mensagens via URL (?err=... ou ?ok=...)
    const params = new URLSearchParams(window.location.search);
    const err = params.get('err');
    const ok = params.get('ok');

    if (err || ok) {
      const modalElement = document.getElementById('modalAviso');
      const modalBody = document.getElementById('modalAvisoBody');
      const modalLabel = document.getElementById('modalAvisoLabel');

      if (err) {
        modalLabel.textContent = 'Atenção';
        modalLabel.classList.add('text-danger');
        modalBody.textContent = decodeURIComponent(err);
      } else {
        modalLabel.textContent = 'Sucesso';
        modalLabel.classList.add('text-success');
        modalBody.textContent = decodeURIComponent(ok);
      }

      const modal = new bootstrap.Modal(modalElement);
      modal.show();

      // Limpa a URL para não ficar mostrando o erro ao atualizar
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  </script>
</body>

</html>
